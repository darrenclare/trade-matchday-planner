<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40">
  <!-- Red top band -->
  <rect width="60" height="13.5" fill="#DE3831"/>
  <!-- Blue bottom band -->
  <rect y="26.5" width="60" height="13.5" fill="#001489"/>
  <!-- Green middle band -->
  <rect y="13.5" width="60" height="13" fill="#007A4D"/>
  <!-- White chevron (outer) -->
  <polygon points="0,0 0,40 30,20" fill="#FFFFFF"/>
  <!-- Yellow chevron (middle) -->
  <polygon points="0,3 0,37 26,20" fill="#FFB612"/>
  <!-- Black triangle -->
  <polygon points="0,7 0,33 20,20" fill="#000000"/>
  <!-- Green chevron (inner, over black) -->
  <polygon points="0,10.5 0,29.5 17,20" fill="#007A4D"/>
</svg>
